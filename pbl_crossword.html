<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PBL Mini Crossword</title>
<style>
  :root {
    --pbl-blue: #002349;
    --pbl-gold: #b29532;
    --nyt-selection: #a7d8ff;
    --nyt-active: #ffda00;
    --err-red: #dc2626;
    --corr-green: #16a34a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; padding: 25px; }
  .page { max-width: 950px; margin: 0 auto; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 4px solid var(--pbl-blue); padding-bottom: 20px; }
  .logo-wrap { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
  .pbl-logo { height: 80px; width: auto; }
  .header-text h1 { font-family: Georgia, serif; font-size: 42px; color: var(--pbl-blue); line-height: 1; }
  .subtitle { font-size: 16px; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-top: 5px; }

  .active-clue-bar { background: var(--pbl-blue); color: #fff; padding: 18px 25px; border-radius: 8px; margin-bottom: 25px; font-size: 22px; font-weight: 600; min-height: 65px; display: flex; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  .status-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .timer-box { font-size: 42px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--pbl-blue); }

  .game-container { display: grid; grid-template-columns: auto 380px; gap: 50px; align-items: start; }
  .grid-wrap { border: 3px solid #000; background: #000; border-radius: 4px; overflow: hidden; width: fit-content; height: fit-content; }
  .grid-row { display: flex; }
  .cell { width: 85px; height: 85px; border: 1px solid #000; background: #fff; position: relative; cursor: pointer; transition: background-color 0.1s; }
  .cell.black { background: var(--pbl-blue); border: none; cursor: default; }
  .cell.word-hi { background: var(--nyt-selection); }
  .cell.selected { background: var(--nyt-active); }
  .cell-num { position: absolute; top: 5px; left: 8px; font-size: 16px; font-weight: 800; color: #444; pointer-events: none; }
  .cell-letter { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; text-transform: uppercase; padding-top: 10px; pointer-events: none; }

  .clue-column h2 { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 3px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 15px; color: var(--pbl-blue); }
  .clue-item { font-size: 17px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: #4b5563; margin-bottom: 3px; line-height: 1.4; }
  .clue-item:hover { background: #f3f4f6; }
  .clue-item.active { background: var(--nyt-selection); font-weight: 700; color: var(--pbl-blue); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
  .modal { background: #fff; padding: 40px; border-radius: 15px; width: 450px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
  .lb-table { width: 100%; margin: 20px 0; border-collapse: collapse; text-align: left; }
  .lb-row { border-bottom: 1px solid #eee; }
  .lb-row td { padding: 12px 8px; font-size: 15px; }
  .lb-row th { padding: 8px; font-size: 13px; text-transform: uppercase; color: #9ca3af; }
  .user-highlight td { font-weight: 800; color: var(--pbl-blue); background: #fff9e6; }

  .btn { padding: 14px 28px; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 0.5px; font-size: 14px; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--pbl-blue); color: #fff; }
  .btn-gold { background: var(--pbl-gold); color: #fff; }
  .btn-check { background: #e5e7eb; color: #374151; margin-left: 10px; }

  #pause-screen { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 500; flex-direction: column; align-items: center; justify-content: center; }
  .hidden-input { position: absolute; opacity: 0; pointer-events: none; top: -100px; }
</style>
</head>
<body>

<input class="hidden-input" id="hidden-input" type="text" autocomplete="off" />

<div id="pause-screen">
  <h2 style="font-size: 56px; color: var(--pbl-blue); margin-bottom: 30px;">&#9646;&#9646; Paused</h2>
  <button class="btn btn-primary" onclick="togglePause()">Resume Game</button>
</div>

<div class="modal-overlay" id="win-modal">
  <div class="modal">
    <div style="font-size:52px; margin-bottom:10px;">&#127881;</div>
    <h2 style="color:var(--pbl-blue); font-size: 30px; font-family: Georgia, serif;">You did it!</h2>
    <p id="final-time-msg" style="margin: 15px 0; font-size: 18px; color: #6b7280;"></p>
    <div id="submission-ui">
      <input type="text" id="player-name" placeholder="Enter your name" style="padding:12px; border:2px solid #ddd; border-radius:8px; width:100%; margin-bottom:12px; font-size:16px; outline:none;" onkeydown="if(event.key==='Enter') submitScore()">
      <button class="btn btn-primary" style="width:100%" onclick="submitScore()">Submit to Leaderboard</button>
    </div>
    <table class="lb-table" id="leaderboard-body"></table>
  </div>
</div>

var state = {}, WORDS = {}, selCell = [0,0], selDir = 'across', seconds = 0, tInterval, isPaused = false, started = false;

function init() { buildWords(); buildGrid(); buildClues(); }

function buildWords() {
  function findPos(n) { for(var r=0;r<5;r++) for(var c=0;c<5;c++) if(PUZZLE.numbers[r][c]===n) return [r,c]; }
  ['across','down'].forEach(function(dir) {
    PUZZLE.clues[dir].forEach(function(cl) {
      var s = findPos(cl.num), cells = [], r = s[0], c = s[1];
      while(r<5 && c<5 && PUZZLE.answers[r][c] !== '#') {
        cells.push([r,c]);
        dir === 'across' ? c++ : r++;
      }
      WORDS[(dir==='across'?'A':'D')+cl.num] = { dir:dir, num:cl.num, clue:cl.clue, cells:cells };
    });
  });
}

function buildGrid() {
  var g = document.getElementById('grid'); g.innerHTML = '';
  for(var r=0;r<5;r++) {
    var row = document.createElement('div'); row.className = 'grid-row';
    for(var c=0;c<5;c++) {
      var div = document.createElement('div');
      div.className = 'cell' + (PUZZLE.answers[r][c]==='#' ? ' black' : '');
      if(PUZZLE.answers[r][c] !== '#') {
        if(PUZZLE.numbers[r][c]) {
          var n = document.createElement('div'); n.className = 'cell-num'; n.textContent = PUZZLE.numbers[r][c]; div.appendChild(n);
        }
        var l = document.createElement('div'); l.className = 'cell-letter'; l.id = 'L'+r+'_'+c; div.appendChild(l);
        div.onclick = (function(rr,cc){ return function(){ onCellClick(rr,cc); }; })(r,c);
        state[r+'_'+c] = '';
      }
      row.appendChild(div);
    }
    g.appendChild(row);
  }
}

function buildClues() {
  ['across','down'].forEach(function(dir) {
    var cont = document.getElementById('clues-'+dir);
    PUZZLE.clues[dir].forEach(function(cl) {
      var d = document.createElement('div'); d.className = 'clue-item'; d.id = (dir==='across'?'CA':'CD')+cl.num;
      d.innerHTML = '<strong>'+cl.num+'</strong> '+cl.clue;
      d.onclick = (function(id){ return function(){ selectWord(id); }; })((dir==='across'?'A':'D')+cl.num);
      cont.appendChild(d);
    });
  });
}

function startGame() {
  started = true;
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('game-btns').style.display = 'block';
  tInterval = setInterval(function() {
    if(!isPaused) {
      seconds++;
      var m = Math.floor(seconds/60), s = seconds%60;
      document.getElementById('timer-display').textContent = m+':'+(s<10?'0':'')+s;
    }
  }, 1000);
  selectWord('A1');
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
  if(!isPaused) setTimeout(function(){ document.getElementById('hidden-input').focus(); }, 50);
}

function onCellClick(r,c) {
  if(!started || isPaused) return;
  if(selCell[0]===r && selCell[1]===c) { selDir = (selDir==='across'?'down':'across'); }
  else { selCell = [r,c]; }
  updateUI();
}

function selectWord(id) {
  if(!started || isPaused) return;
  var w = WORDS[id]; if(!w) return;
  selDir = w.dir; selCell = w.cells[0]; updateUI();
}

function getCellEl(r,c) { return document.getElementById('L'+r+'_'+c); }

function updateUI() {
  document.querySelectorAll('.cell').forEach(function(el){ el.classList.remove('word-hi','selected'); });
  document.querySelectorAll('.clue-item').forEach(function(el){ el.classList.remove('active'); });
  var currentWord = Object.values(WORDS).find(function(w){ return w.dir===selDir && w.cells.some(function(p){ return p[0]===selCell[0] && p[1]===selCell[1]; }); });
  if(!currentWord) {
    selDir = (selDir==='across'?'down':'across');
    currentWord = Object.values(WORDS).find(function(w){ return w.dir===selDir && w.cells.some(function(p){ return p[0]===selCell[0] && p[1]===selCell[1]; }); });
  }
  if(currentWord) {
    currentWord.cells.forEach(function(p) { var el = getCellEl(p[0],p[1]); if(el) el.parentElement.classList.add('word-hi'); });
    var clueDom = document.getElementById((selDir==='across'?'CA':'CD')+currentWord.num);
    if(clueDom) clueDom.classList.add('active');
    document.getElementById('active-clue').innerHTML = '<strong>'+currentWord.num+selDir[0].toUpperCase()+':</strong> '+currentWord.clue;
  }
  var selEl = getCellEl(selCell[0],selCell[1]);
  if(selEl) selEl.parentElement.classList.add('selected');
  document.getElementById('hidden-input').focus();
}

function checkGrid() {
  Object.keys(state).forEach(function(k) {
    var parts = k.split('_'), r = parseInt(parts[0]), c = parseInt(parts[1]);
    if(state[k] !== '') { var el = getCellEl(r,c); if(el) el.style.color = (state[k]===PUZZLE.answers[r][c]) ? 'var(--corr-green)' : 'var(--err-red)'; }
  });
}

document.getElementById('hidden-input').addEventListener('keydown', function(e) {
  if(!started || isPaused) return;
  var r = selCell[0], c = selCell[1];
  if(e.key==='ArrowRight' && c<4 && PUZZLE.answers[r][c+1]!=='#') { selCell=[r,c+1]; selDir='across'; }
  else if(e.key==='ArrowLeft' && c>0 && PUZZLE.answers[r][c-1]!=='#') { selCell=[r,c-1]; selDir='across'; }
  else if(e.key==='ArrowUp' && r>0 && PUZZLE.answers[r-1][c]!=='#') { selCell=[r-1,c]; selDir='down'; }
  else if(e.key==='ArrowDown' && r<4 && PUZZLE.answers[r+1][c]!=='#') { selCell=[r+1,c]; selDir='down'; }
  if(e.key==='Enter') {
    e.preventDefault();
    var wordKeys = Object.keys(WORDS);
    var currentKey = (selDir==='across'?'A':'D') + Object.values(WORDS).find(function(w){ return w.dir===selDir && w.cells.some(function(p){ return p[0]===selCell[0] && p[1]===selCell[1]; }); }).num;
    var idx = wordKeys.indexOf(currentKey);
    var nextKey = wordKeys[(idx + 1) % wordKeys.length];
    var nextWord = WORDS[nextKey];
    selDir = nextWord.dir;
    selCell = nextWord.cells[0];
  }
  if(e.key==='Backspace') {
    e.preventDefault();
    if(state[r+'_'+c]==='') {
      var w = Object.values(WORDS).find(function(w){ return w.dir===selDir && w.cells.some(function(p){ return p[0]===r && p[1]===c; }); });
      if(w) { var i = w.cells.findIndex(function(p){ return p[0]===r && p[1]===c; }); if(i>0) selCell = w.cells[i-1]; }
    }
    state[selCell[0]+'_'+selCell[1]] = '';
    var el = getCellEl(selCell[0],selCell[1]); if(el) { el.textContent=''; el.style.color='#000'; }
  }
  updateUI();
});

document.getElementById('hidden-input').addEventListener('input', function(e) {
  if(!started || isPaused) return;
  var char = e.target.value.slice(-1).toUpperCase();
  if(/[A-Z]/.test(char)) {
    state[selCell[0]+'_'+selCell[1]] = char;
    var el = getCellEl(selCell[0],selCell[1]); if(el) { el.textContent=char; el.style.color='#000'; }
    var w = Object.values(WORDS).find(function(w){ return w.dir===selDir && w.cells.some(function(p){ return p[0]===selCell[0] && p[1]===selCell[1]; }); });
    if(w) { var i = w.cells.findIndex(function(p){ return p[0]===selCell[0] && p[1]===selCell[1]; }); if(i < w.cells.length-1) selCell = w.cells[i+1]; }
    updateUI(); checkWin();
  }
  e.target.value = '';
});

function checkWin() {
  var won = Object.keys(state).every(function(k) { var parts = k.split('_'), r = parseInt(parts[0]), c = parseInt(parts[1]); return state[k]===PUZZLE.answers[r][c]; });
  if(won) { clearInterval(tInterval); showWin(); }
}

function showWin() {
  document.getElementById('final-time-msg').textContent = 'Solved in ' + seconds + ' seconds!';
  document.getElementById('win-modal').style.display = 'flex';
  renderLeaderboard();
}

var SHEET_URL = 'https://script.google.com/macros/s/AKfycbz4yU5bhF0fUS06eJDZ5b8eWPyU2dZnzujryBCTDaZuXxihgIFlTDeGYcKgw2EDmyz8/exec';

function submitScore() {
  var name = document.getElementById('player-name').value.trim() || 'Anonymous';
  var time = seconds;

  // Hide form and immediately show leaderboard with user's score
  document.getElementById('submission-ui').style.display = 'none';
  renderLeaderboardImmediate(name, time);

  // Fire off to Google Sheet in background
  var params = '?name=' + encodeURIComponent(name) + '&time=' + encodeURIComponent(time);
  fetch(SHEET_URL + params).then(function() {
    renderLeaderboard(name, time);
  }).catch(function() {});
}

function renderLeaderboardImmediate(currentName, currentTime) {
  // Show user's own score instantly while sheet loads
  var lb = document.getElementById('leaderboard-body');
  var html = '<tr><th>#</th><th>Name</th><th>Time</th></tr>';
  html += '<tr class="lb-row user-highlight"><td>-</td><td>' + currentName + '</td><td>' + currentTime + 's</td></tr>';
  lb.innerHTML = html;
}

function renderLeaderboard(currentName, currentTime) {
  var lb = document.getElementById('leaderboard-body');
  lb.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:20px;">Loading...</td></tr>';

  fetch(SHEET_URL)
    .then(function(r) { return r.json(); })
    .then(function(scores) {
      var html = '<tr><th>#</th><th>Name</th><th>Time</th></tr>';
      if(!scores || scores.length === 0) {
        html += '<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:20px;">No scores yet!</td></tr>';
      } else {
        scores.forEach(function(s) {
          var isUser = currentName && s.name === currentName && parseInt(s.time) === currentTime;
          html += '<tr class="lb-row '+(isUser?'user-highlight':'')+'"><td>'+s.rank+'</td><td>'+s.name+'</td><td>'+s.time+'s</td></tr>';
        });
      }
      lb.innerHTML = html;
    })
    .catch(function() {
      lb.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:20px;">Could not load scores.</td></tr>';
    });
}

init();
</script>
